# =============================================================================
# ESPHome: Servo + OLED Display
# =============================================================================
# Hardware: NodeMCU v2 (ESP8266)
# Servo:    MC-410 Standard Modelcraft Servo → D7 (GPIO13)
# OLED:     SSD1306 128x64 I2C → D2/GPIO4 (SDA), D1/GPIO5 (SCL)
#
# Wiring — Servo MC-410:
#   Brown  → GND
#   Red    → VIN (5V from USB)
#   Orange → D7 (GPIO13, PWM Signal)
#
# Wiring — OLED Display:
#   Red    → 3.3V
#   Blue   → GND
#   Orange → D1 (GPIO5, SCL)
#   White  → D2 (GPIO4, SDA)
# =============================================================================

esphome:
  name: servo-oled
  friendly_name: Servo OLED

esp8266:
  board: nodemcuv2

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
wifi:
  ssid: !env_var ESPHOME_WIFI_SSID
  password: !env_var ESPHOME_WIFI_PASSWORD

api:
  encryption:
    key: !env_var ESPHOME_API_KEY

ota:
  - platform: esphome
    password: !env_var ESPHOME_OTA_PASSWORD

logger:
  level: INFO

# ---------------------------------------------------------------------------
# I2C — OLED
# ---------------------------------------------------------------------------
i2c:
  sda: GPIO4   # D2
  scl: GPIO5   # D1
  scan: true

# ---------------------------------------------------------------------------
# OLED Display (SSD1306 128x64)
# ---------------------------------------------------------------------------
display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: oled
    lambda: |-
      it.printf(0, 0, id(font_large), "Servo");
      it.printf(0, 28, id(font_large), "%.0f deg", id(servo_angle).state);
      it.printf(0, 52, id(font_small), id(servo_angle).state == 180 ? "TRIGGERED" : "STANDBY");

font:
  - file: "gfonts://Roboto"
    id: font_large
    size: 24
  - file: "gfonts://Roboto"
    id: font_small
    size: 12

# ---------------------------------------------------------------------------
# Servo Output (ESP8266 PWM)
# ---------------------------------------------------------------------------
output:
  - platform: esp8266_pwm
    id: servo_pwm
    pin: GPIO13  # D7
    frequency: 50 Hz

servo:
  - id: my_servo
    output: servo_pwm
    min_level: 3.0%   # ~0.6ms pulse  → 0°
    max_level: 11.5%  # ~2.3ms pulse  → 180°

# ---------------------------------------------------------------------------
# State — current angle
# ---------------------------------------------------------------------------
globals:
  - id: current_angle
    type: float
    restore_value: false
    initial_value: '0.0'

sensor:
  - platform: template
    id: servo_angle
    name: "Servo Angle"
    icon: mdi:rotate-right
    unit_of_measurement: "°"
    accuracy_decimals: 0
    state_class: measurement
    lambda: "return id(current_angle);"
    update_interval: 500ms

# ---------------------------------------------------------------------------
# Scripts
# ---------------------------------------------------------------------------
script:
  # Move servo to a specific angle (0–180)
  - id: move_to_angle
    parameters:
      angle: float
    then:
      - lambda: |-
          float level = (angle / 180.0f) * 2.0f - 1.0f;  // map 0-180 → -1.0 to 1.0
          id(my_servo).write(level);
          id(current_angle) = angle;
          ESP_LOGI("servo", "Moving to %.0f deg (level=%.3f)", angle, level);

  # Trigger: move to 180°, wait 1s, return to 0°
  - id: trigger_180
    then:
      - script.execute:
          id: move_to_angle
          angle: 180.0
      - delay: 1s
      - script.execute:
          id: move_to_angle
          angle: 0.0

# ---------------------------------------------------------------------------
# HA Entities
# ---------------------------------------------------------------------------
button:
  - platform: template
    name: "Servo Trigger"
    icon: mdi:rotate-right
    on_press:
      - script.execute: trigger_180

number:
  - platform: template
    name: "Servo Angle Set"
    id: servo_angle_set
    icon: mdi:rotate-right
    min_value: 0
    max_value: 180
    step: 1
    optimistic: true
    set_action:
      - script.execute:
          id: move_to_angle
          angle: !lambda "return x;"
